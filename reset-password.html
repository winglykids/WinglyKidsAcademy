<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - WinglyKidsAcademy</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--navy:#1b2b4b;--coral:#ff6b6b;--mint:#2fd6a3;--bg:#f7f8fb;--line:#e5e7eb;}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Arial,sans-serif;background:var(--bg);color:var(--navy);display:grid;place-items:center;padding:20px}
    .card{width:min(460px,100%);background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px;box-shadow:0 18px 45px rgba(27,43,75,.10)}
    .brand{font-size:24px;font-weight:900;margin-bottom:10px;color:var(--coral)}
    h1{font-size:26px;margin:0 0 10px}
    p{line-height:1.55;color:#596579;margin:0 0 18px}
    label{display:block;font-weight:800;margin:16px 0 8px}
    input{width:100%;border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:16px;color:var(--navy)}
    .check{display:flex;align-items:center;gap:9px;margin:14px 0 18px;color:#596579;font-weight:700}
    .check input{width:auto}
    button{width:100%;border:0;border-radius:12px;background:linear-gradient(135deg,var(--coral),var(--mint));color:#fff;font-size:17px;font-weight:900;padding:14px 18px;cursor:pointer}
    button:disabled{opacity:.65;cursor:not-allowed}
    .status{display:none;margin-top:16px;padding:12px 14px;border-radius:12px;font-weight:800}
    .ok{display:block;background:#e8fff6;color:#15775a}
    .bad{display:block;background:#fff0f0;color:#c62828}
    .link{display:inline-block;margin-top:18px;color:var(--navy);font-weight:900;text-decoration:none}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">WinglyKidsAcademy</div>
    <h1>Create a new password</h1>
    <p>Enter a new password for the student account. Passwords are never sent by email.</p>

    <form id="reset-form">
      <label for="new-password">New password</label>
      <input id="new-password" type="password" autocomplete="new-password" minlength="6" required>

      <label for="confirm-password">Confirm password</label>
      <input id="confirm-password" type="password" autocomplete="new-password" minlength="6" required>

      <label class="check"><input id="show-password" type="checkbox"> Show password</label>
      <button id="submit-btn" type="submit" disabled>Update Password</button>
    </form>

    <div id="status" class="status"></div>
    <a class="link" href="/">Back to login</a>
  </main>

  <script>
    const SUPABASE_URL = 'https://qhyjvexemvmfavooxlao.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoeWp2ZXhlbXZtZmF2b294bGFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjk5ODIsImV4cCI6MjA5ODgwNTk4Mn0.fYdhcIsdlmbMLTUMFQAFg61e8TrNIT0A7oFdf3HAFgs';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const form = document.getElementById('reset-form');
    const passwordInput = document.getElementById('new-password');
    const confirmInput = document.getElementById('confirm-password');
    const showPassword = document.getElementById('show-password');
    const submitBtn = document.getElementById('submit-btn');
    const statusEl = document.getElementById('status');

    function setStatus(message, ok){
      statusEl.textContent = message;
      statusEl.className = ok ? 'status ok' : 'status bad';
    }

    function validate(){
      submitBtn.disabled = !(passwordInput.value.length >= 6 && passwordInput.value === confirmInput.value);
    }

    async function markPasswordChanged(){
      const { data: { user }, error: userError } = await sb.auth.getUser();
      if (userError) throw userError;
      if (!user) throw new Error('No authenticated user found for password reset.');

      const changedAt = new Date().toISOString();
      const updateById = await sb
        .from('students')
        .update({ last_password_changed_at: changedAt })
        .eq('auth_user_id', user.id);

      if (updateById.error) throw updateById.error;

      const { data: rowById, error: rowByIdError } = await sb
        .from('students')
        .select('id')
        .eq('auth_user_id', user.id)
        .maybeSingle();

      if (rowByIdError) throw rowByIdError;
      if (rowById) return;

      const updateByEmail = await sb
        .from('students')
        .update({ last_password_changed_at: changedAt })
        .eq('auth_email', String(user.email || '').toLowerCase());

      if (updateByEmail.error) throw updateByEmail.error;
    }

    async function prepareRecoverySession(){
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      if (code) {
        const { error } = await sb.auth.exchangeCodeForSession(code);
        if (error) throw error;
        window.history.replaceState({}, document.title, window.location.pathname);
      }
      const { data } = await sb.auth.getSession();
      if (!data.session) {
        setStatus('This reset link is invalid or expired. Please request a new password reset from the login page.', false);
        form.style.display = 'none';
      }
    }

    passwordInput.addEventListener('input', validate);
    confirmInput.addEventListener('input', validate);
    showPassword.addEventListener('change', () => {
      const type = showPassword.checked ? 'text' : 'password';
      passwordInput.type = type;
      confirmInput.type = type;
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (passwordInput.value.length < 6) {
        setStatus('Password must be at least 6 characters.', false);
        return;
      }
      if (passwordInput.value !== confirmInput.value) {
        setStatus('Passwords do not match.', false);
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';
      try {
        const { error } = await sb.auth.updateUser({ password: passwordInput.value });
        if (error) throw error;
        await markPasswordChanged();
        await sb.auth.signOut();
        form.style.display = 'none';
        setStatus('Password updated. You can now log in with the new password.', true);
      } catch (error) {
        console.error(error);
        setStatus('Could not update the password. Please request a fresh reset link and try again.', false);
        submitBtn.disabled = false;
      } finally {
        submitBtn.textContent = 'Update Password';
      }
    });

    prepareRecoverySession().catch((error) => {
      console.error(error);
      setStatus('This reset link is invalid or expired. Please request a new password reset from the login page.', false);
      form.style.display = 'none';
    });
  </script>
</body>
</html>
